{% load static %}
<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>마이가드 - 게시판</title>
  <link rel="stylesheet" href="{% static 'css/blog.css' %}">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pretendard@1.3.6/dist/web/static/pretendard.css" />
</head>

<body>
  <div class="main-container">
    <header class="header">
      <div class="logo-box">
        <div class="logo-icon">🛡️</div>
        <div class="logo-text">마이가드</div>
      </div>
      <button class="home-btn" onclick="location.href='/'">🏠</button>
    </header>
    <form method="get" action="{% url 'main:blog' %}" class="search-bar">
      <input type="text" name="search" placeholder="검색" value="{{ search_query }}">
      <select name="sort">
        <option value="recent" {% if sort == "recent" %}selected{% endif %}>최신순</option>
        <option value="popular" {% if sort == "popular" %}selected{% endif %}>인기순</option>
        <option value="safety_high" {% if sort == "safety_high" %}selected{% endif %}>안전도 높은순</option>
        <option value="safety_low" {% if sort == "safety_low" %}selected{% endif %}>안전도 낮은순</option>
      </select>
      <button type="submit">검색</button>
    </form>
    <div class="post-list">
      {% for item in postlist %}
      <div class="post-item">
        <a href="{{ item.pk }}/">{{ item.postname }}</a>
        <div class="post-meta">조회수: {{ item.view_count }}</div>
      </div>
      {% empty %}
      <p>등록된 게시글이 없습니다.</p>
      {% endfor %}
    </div>
    <button class="write-btn" onclick="location.href='new_post/'">✏️ 글쓰기</button>
    <nav>
      <a href="/map">경찰서</a>
      <a href="/map/search">길 찾기</a>
      <a href="/blog">게시판</a>
      <a href="/user/manage-emergency-contacts/">긴급연락처</a>
      <a href="/user/mypage/">마이페이지</a>
    </nav>
  </div>
</body>

</html>
