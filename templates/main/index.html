<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>마이가드 - 안전한 귀갓길 동행</title>

    <!-- Pretendard 폰트 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pretendard@1.3.6/dist/web/static/pretendard.css" />
    <link rel="stylesheet" href="../../static/css/index.css">
    <style>

    </style>

    <!-- Kakao Maps SDK -->
    <script
        src="//dapi.kakao.com/v2/maps/sdk.js?appkey=2947f55a1ba70613c1e8c7124bf08ebd&libraries=clusterer&autoload=false"></script>
</head>

<body>
    <div class="main-container">

        <!-- ✅ 헤더 -->
        <header class="header">
            <div class="logo-box">
                <div class="logo-icon">🛡️</div>
                <div class="logo-text">마이가드</div>
            </div>
            <div class="status">📍 현재 위치 기반</div>
            <div class="header-btns">
                <button onclick="alert('🔔 알림 없음')">🔔</button>
                <button onclick="alert('⚙️ 설정')">⚙️</button>
            </div>
        </header>

        <!-- ✅ 지도 -->
        <div id="map"></div>

        <!-- 긴급 전화 버튼 -->
        <button id="emergency-button" onclick="toggleEmergencyMenu()">📞</button>

        <!-- 모달 메뉴: 기본은 숨김 -->
        <div id="emergency-menu" class="emergency-menu hidden">
            <button onclick="callEmergencyContact()">☎️ 긴급연락처</button>
            <button onclick="call112()">🚓 112 신고</button>
        </div>

        <!-- ✅ 하단 내비 -->
        <nav>
            <a href="/map" >경찰서</a>
            <a href="/map/search" >길 찾기</a>
            <a href="/blog">게시판</a>
            <a href="/user/manage-emergency-contacts/">긴급연락처</a>
            <a href="/user/mypage/">마이페이지</a>
        </nav>
    </div>

    <!-- ✅ 지도 스크립트 -->
    <script>
        function initKakaoMap() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(position => {
                    const lat = position.coords.latitude;
                    const lng = position.coords.longitude;
                    createMap(new kakao.maps.LatLng(lat, lng));
                }, () => {
                    console.warn("위치 불러오기 실패 → 기본 위치 사용");
                    createMap(new kakao.maps.LatLng(37.5665, 126.9780));
                });
            } else {
                createMap(new kakao.maps.LatLng(37.5665, 126.9780));
            }
        }

        function createMap(centerLatLng) {
            const map = new kakao.maps.Map(document.getElementById('map'), {
                center: centerLatLng,
                level: 5
            });

            const userMarker = new kakao.maps.Marker({
                position: centerLatLng,
                map: map
            });

            // 예시 마커 (향후 JSON 불러오기 가능)
            const testMarker = new kakao.maps.Marker({
                position: new kakao.maps.LatLng(37.5655, 126.9785),
                map: map
            });

            const info = new kakao.maps.InfoWindow({
                content: "<div style='padding:5px;font-size:13px;'>예시 마커입니다</div>"
            });

            kakao.maps.event.addListener(testMarker, 'click', function () {
                info.open(map, testMarker);
            });
        }

        // 실행
        kakao.maps.load(function () {
            initKakaoMap();
        });

        let isMenuOpen = false;

        function toggleEmergencyMenu() {
            const menu = document.getElementById('emergency-menu');
            isMenuOpen = !isMenuOpen;
            menu.classList.toggle('hidden', !isMenuOpen);
        }

        function callEmergencyContact() {
            window.location.href = 'tel:010-0000-0000'; // 바꿔야 함
        }

        function call112() {
            window.location.href = 'tel:112';
        }

        // 버튼/메뉴 바깥 클릭 시 닫기
        document.addEventListener('click', (e) => {
            const menu = document.getElementById('emergency-menu');
            const button = document.getElementById('emergency-button');
            if (!menu.contains(e.target) && !button.contains(e.target)) {
                menu.classList.add('hidden');
                isMenuOpen = false;
            }
        });
    </script>
</body>

</html>
