<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../../static/css/emergency.css">
    <link rel="stylesheet" href="../../static/css/mypage.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pretendard@1.3.6/dist/web/static/pretendard.css" />
    <title>긴급 연락처 설정</title>
</head>

<body>
    <div class="main-container">
        <header>
            <div class="logo-box">
                <div class="logo-icon">🛡️</div>
                <div class="logo-text">마이가드</div>
            </div>
            <div class="home-btn" onclick="location.href='/'">🏠</div>
        </header>

        <div class="content">
            <h1 class="page-title">긴급 연락처 설정</h1>
            
            <div class="contact-form">
                <form method="post">
                    {% csrf_token %}
                    {{ formset.management_form }}
                    {% for form in formset %}
                        <fieldset>
                            <legend>긴급 연락처 {{ forloop.counter }}</legend>
                            {{ form.as_p }}
                            {# 삭제 체크박스 추가 #}
                        </fieldset>
                    {% endfor %}
                    
                    <div class="button-group">
                        <button type="submit">저장</button>
                        <button type="button" onclick="window.history.back()">뒤로 가기</button>
                    </div>
                </form>
            </div>
        </div>

       <nav>
            <a href="/map">경찰서</a>
            <a href="/map/search">길 찾기</a>
            <a href="/blog">게시판</a>
            <a href="/user/manage-emergency-contacts/">긴급연락처</a>
            <a href="/user/mypage/">마이페이지</a>
        </nav>
    </div>
</body>

</html>
