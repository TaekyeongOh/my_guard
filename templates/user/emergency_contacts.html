<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>긴급 연락처 설정</title>
</head>
<body>
    <h1>긴급 연락처 설정</h1>
    <form method="post">
        {% csrf_token %}
        {{ formset.management_form }}
        {% for form in formset %}
            <fieldset>
                <legend>긴급 연락처 {{ forloop.counter }}</legend>
                {{ form.as_p }}
                {# 삭제 체크박스 추가 #}
            </fieldset>
        {% endfor %}
        <button type="submit">저장</button>
    </form>
    <button onclick="window.history.back()">뒤로 가기</button>
</body>
</html>
