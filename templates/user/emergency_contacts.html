                <!-- 예시 연락처 1 -->
                <fieldset>
                    <legend>긴급 연락처 1</legend>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="name1">이름</label>
                            <input type="text" id="name1" name="name1" placeholder="이름을 입력하세요">
                        </div>
                        <div class="form-group">
                            <label for="relationship1">관계</label>
                            <select id="relationship1" name="relationship1">
                                <option value="">관계를 선택하세요</option>
                                <option value="family">가족</option>
                                <option value="friend">친구</option>
                                <option value="colleague">동료</option>
                                <option value="other">기타</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="phone1">전화번호</label>
                            <input type="tel" id="phone1" name="phone1" placeholder="010-0000-0000">
                        </div>
                        <div class="form-group">
                            <label for="email1">이메일</label>
                            <input type="email" id="email1" name="email1" placeholder="example@email.com">
                        </div>
                    </div>
                    <div class="checkbox-group">
                        <input type="checkbox" id="delete1" name="delete1">
                        <label for="delete1">이 연락처를 삭제합니다</label>
                    </div>
                </fieldset>
