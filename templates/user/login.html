<!DOCTYPE html>
<html lang="ko">

<head>
    {% load static %}
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>마이가드 - 로그인</title>
    <link rel="stylesheet" href="{% static 'css/login.css' %}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pretendard@1.3.6/dist/web/static/pretendard.css" />
</head>

<body>
    <div class="main-container">
        <header>
            <div class="header-center">
                <div class="logo-icon">🛡️</div>
                <div class="logo-text">마이가드</div>
            </div>
        </header>
 
        <div class="login-content">
            <div class="welcome-text">
                <h2>다시 만나서 반가워요!</h2>
                <p>안전한 우리 동네를 위해 로그인해주세요</p>
            </div>

    
            <form method="post" id="login-form">
                {% csrf_token %}
                
    
                {% if form %}
                    {{ form.as_p }}
                {% else %}

                    <label for="username">아이디</label>
                    <input type="text" id="username" name="username" required>

                    <label for="password">비밀번호</label>
                    <input type="password" id="password" name="password" required>
                {% endif %}

                <button type="submit" class="submit-btn">로그인</button>
            </form>

            <div class="divider">
                <span>또는</span>
            </div>

            <div class="link-section">
                <a href="{% url 'signup' %}" class="link-btn primary">회원가입 하러 가기</a>

                <form action="{% url 'password_search' %}" method="get" style="margin: 0;">
                    <button type="submit" class="link-btn">비밀번호 찾기</button>
                </form>

            </div>
        </div>
    </div>

    {% if messages %}
    {% for message in messages %}
    <div class="message-overlay" onclick="this.remove()">
        <div class="message-box" onclick="event.stopPropagation()">
            <p>{{ message }}</p>
            <button onclick="this.closest('.message-overlay').remove()">확인</button>
        </div>
    </div>
    {% endfor %}
    {% endif %}

    <script>
        function showMessage(text) {
            const overlay = document.createElement('div');
            overlay.className = 'message-overlay';
            overlay.onclick = () => overlay.remove();

            overlay.innerHTML = `
                <div class="message-box" onclick="event.stopPropagation()">
                    <p>${text}</p>
                    <button onclick="this.closest('.message-overlay').remove()">확인</button>
                </div>
            `;

            document.body.appendChild(overlay);
        }

        // 로그인 응답 처리
        function handleLoginResponse(response) {
            if (response.is_authenticated) {
                localStorage.setItem('user_id', response.id);
                localStorage.setItem('username', response.username);
                localStorage.setItem('nickname', response.nickname);
                console.log('로그인 성공, 사용자 정보 저장');

                window.location.href = '/'; 
            } else {
                showMessage('로그인 실패');
            }
        }

        // 로그인 폼 제출 이벤트 처리
        document.getElementById('login-form').addEventListener('submit', function (event) {
            event.preventDefault(); 
            const formData = new FormData(this);

            fetch('/user/login/', {
                method: 'POST',
                body: formData,
                headers: {
                    'X-CSRFToken': document.querySelector('[name=csrfmiddlewaretoken]').value
                }
            })
            .then(response => response.json())
            .then(handleLoginResponse)
            .catch(error => {
                console.error('로그인 오류:', error);
                showMessage('로그인 중 오류가 발생했습니다.');
            });
        });
    </script>
</body>

</html>
