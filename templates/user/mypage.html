<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>마이가드 - 마이페이지</title>
    <link rel="stylesheet" href="../../static/css/mypage.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pretendard@1.3.6/dist/web/static/pretendard.css" />
    <style>

    </style>
</head>

<body>
    <div class="main-container">
        <!-- ✅ 헤더 -->
        <header>
            <div class="logo-box">
                <div class="logo-icon">🛡️</div>
                <div class="logo-text">마이가드</div>
            </div>
            <button class="home-btn" onclick="location.href='/'">🏠</button>
        </header>

        <!-- ✅ 메인 콘텐츠 -->
        <div class="content">
            <h2 class="page-title">마이페이지</h2>

            <!-- 사용자 정보 섹션 -->
            <div class="user-info">
                <div class="user-greeting">
                    안녕하세요, <span class="user-name">{{ user.username }}</span>님
                </div>
            </div>

            <!-- 메뉴 섹션 -->
            <div class="menu-section">
                <!-- 긴급연락처 관리 -->
                <form action="{% url 'manage_emergency_contacts' %}" method="get" style="margin: 0;">
                    <button type="submit" class="menu-item emergency">
                        📞 긴급연락처 관리
                    </button>
                </form>

                <!-- 로그아웃 -->
                <a href="{% url 'logout' %}" class="menu-item logout" style="display: block; text-decoration: none;">
                    🚪 로그아웃
                </a>

                <!-- 회원탈퇴 -->
                <form action="{% url 'withdraw' %}" method="post" style="margin: 0;"
                    onsubmit="return confirm('정말로 회원탈퇴를 하시겠습니까?');">
                    {% csrf_token %}
                    <button type="submit" class="menu-item withdraw">
                        ⚠️ 회원탈퇴
                    </button>
                </form>
            </div>
        </div>

        <nav>
            <a href="/map">경찰서</a>
            <a href="/map/search">길 찾기</a>
            <a href="/blog">게시판</a>
            <a href="/user/manage-emergency-contacts/">긴급연락처</a>
            <a href="/user/mypage/">마이페이지</a>
        </nav>
    </div>

    <script>
        // 회원탈퇴 확인 메시지 (이미 onsubmit으로 처리되어 있음)
    </script>
</body>

</html>
