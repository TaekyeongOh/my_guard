<!DOCTYPE html>
<html lang="ko">

<head>
    {% load static %}
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>마이가드 - 비밀번호 찾기</title>
    <link rel="stylesheet" href="{% static 'css/signup.css' %}" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pretendard@1.3.6/dist/web/static/pretendard.css" />
</head>

<body>
    <div class="main-container">
        <!-- ✅ 헤더 -->
        <header>
            <div class="header-center">
                <div class="logo-icon">🛡️</div>
                <div class="logo-text">마이가드</div>
            </div>
        </header>

        <!-- ✅ 비밀번호 찾기 컨텐츠 -->
        <div class="signup-content">
            <div class="welcome-text">
                <h2>비밀번호 찾기</h2>
                <p>가입 시 사용한 아이디를 입력해주세요.</p>
            </div>

            <form method="post" action="{% url 'password_search' %}">
                {% csrf_token %}

                <div class="form-group">
                    <label for="id">가입한 아이디</label>
                    <input type="text" name="id" id="id" required />
                </div>

                <button type="submit" class="submit-btn">비밀번호 찾기</button>
                <!-- ✅ 로그인으로 돌아가기 버튼 -->
                <a href="{% url 'login' %}" class="link-btn small-btn">
                    로그인 화면으로 돌아가기
                </a>
            </form>

            <!-- ✅ 메시지 alert 처리 -->
            {% if messages %}
            {% for message in messages %}
            <script>alert("{{ message }}");</script>
            {% endfor %}
            {% endif %}

            <!-- ✅ 찾은 비밀번호 출력 -->
            {% if found_password %}
            <hr>
            <p><strong>비밀번호:</strong> {{ found_password }}</p>
            {% endif %}
        </div>
    </div>
</body>

</html>
