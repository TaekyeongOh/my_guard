<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="./map_search.css" />
    <meta charset="utf-8"/>
    <title>Kakao 지도 장소 검색</title>
    <style>
        .map_wrap {position:relative;width:100%;height:500px;}
        #map {width:100%;height:100%;}
        #menu_wrap {position:absolute;top:0;left:0;width:300px;height:100%;overflow-y:auto;background:#fff;z-index:10;padding:10px;}
        .option input[type="text"] {width:180px;}
        .item {padding:10px;border-bottom:1px solid #ddd;cursor:pointer;}
        .on {font-weight:bold;}
    </style>
</head>
<body>
    <div class="map_wrap">
        <div id="map"></div>
        <div id="menu_wrap">
            <div class="option">
                <form class="form">
                    키워드 : <input type="text" id="keyword" size="15"> 
                    <button type="submit">검색</button> 
                </form>
            </div>
            <hr>
            <ul id="placesList"></ul>
            <div id="pagination"></div>
        </div>
    </div>

    <script>
        const KAKAO_APP_KEY = "{{ kakao_maps_app_key }}";
        const script = document.createElement("script");
        script.src = `//dapi.kakao.com/v2/maps/sdk.js?appkey=${KAKAO_APP_KEY}&autoload=false&libraries=services`;
        document.head.appendChild(script);

        script.onload = () => {
            kakao.maps.load(() => {
                let presentPosition;
                const mapContainer = document.getElementById('map');
                const mapOption = {
                    center: new kakao.maps.LatLng(37.566826, 126.9786567),
                    level: 5
                };
                const map = new kakao.maps.Map(mapContainer, mapOption);
                const ps = new kakao.maps.services.Places();
                const infowindow = new kakao.maps.InfoWindow({zIndex:1});
                const geocoder = new kakao.maps.services.Geocoder();
                let markers = [];

                // 현재 위치로 이동
                if (navigator.geolocation) {
                    navigator.geolocation.getCurrentPosition((position) => {
                        const lat = position.coords.latitude;
                        const lon = position.coords.longitude;
                        presentPosition = new kakao.maps.LatLng(lat, lon);
                        map.setCenter(presentPosition);
                    });
                }

                document.querySelector('.form').addEventListener('submit', (e) => {
                    e.preventDefault();
                    searchPlaces();
                });

                function searchPlaces() {
                    const keyword = document.getElementById('keyword').value.trim();
                    if (!keyword) {
                        alert('키워드를 입력해주세요!');
                        return;
                    }
                    ps.keywordSearch(keyword, placesSearchCB);
                }

                function placesSearchCB(data, status, pagination) {
                    if (status === kakao.maps.services.Status.OK) {
                        displayPlaces(data);
                        displayPagination(pagination);
                    } else if (status === kakao.maps.services.Status.ZERO_RESULT) {
                        alert('검색 결과가 없습니다.');
                    } else {
                        alert('검색 중 오류가 발생했습니다.');
                    }
                }

                function displayPlaces(places) {
                    const listEl = document.getElementById('placesList');
                    const bounds = new kakao.maps.LatLngBounds();
                    const fragment = document.createDocumentFragment();

                    removeAllChildNods(listEl);
                    removeMarker();

                    places.forEach((place, i) => {
                        const placePosition = new kakao.maps.LatLng(place.y, place.x);
                        const marker = addMarker(placePosition, i);
                        const itemEl = getListItem(i, place);

                        bounds.extend(placePosition);

                        kakao.maps.event.addListener(marker, 'mouseover', () => {
                            displayInfowindow(marker, place.place_name);
                        });
                        kakao.maps.event.addListener(marker, 'mouseout', () => {
                            infowindow.close();
                        });

                        itemEl.addEventListener('mouseover', () => {
                            displayInfowindow(marker, place.place_name);
                        });
                        itemEl.addEventListener('mouseout', () => {
                            infowindow.close();
                        });

                        const goToMap = () => {
                            searchDetailAddrFromCoords(presentPosition, (result, status) => {
                                if (status === kakao.maps.services.Status.OK) {
                                    const start = result[0].road_address?.address_name || result[0].address.address_name;
                                    const end = place.place_name;
                                    location.href = `https://map.kakao.com/?sName=${start}&eName=${end}`;
                                }
                            });
                        };

                        itemEl.addEventListener('click', goToMap);
                        kakao.maps.event.addListener(marker, 'click', goToMap);

                        fragment.appendChild(itemEl);
                    });

                    listEl.appendChild(fragment);
                    map.setBounds(bounds);
                }

                function getListItem(index, place) {
                    const el = document.createElement('li');
                    el.className = 'item';
                    el.innerHTML = `
                        <span class="markerbg marker_${index+1}"></span>
                        <div class="info">
                            <h5>${place.place_name}</h5>
                            <span>${place.road_address_name || place.address_name}</span><br>
                            <span class="tel">${place.phone || ''}</span>
                        </div>
                    `;
                    return el;
                }

                function addMarker(position, idx) {
                    const marker = new kakao.maps.Marker({ position });
                    marker.setMap(map);
                    markers.push(marker);
                    return marker;
                }

                function removeMarker() {
                    markers.forEach(marker => marker.setMap(null));
                    markers = [];
                }

                function displayInfowindow(marker, title) {
                    infowindow.setContent(`<div style="padding:5px;">${title}</div>`);
                    infowindow.open(map, marker);
                }

                function displayPagination(pagination) {
                    const paginationEl = document.getElementById('pagination');
                    const fragment = document.createDocumentFragment();
                    while (paginationEl.hasChildNodes()) {
                        paginationEl.removeChild(paginationEl.lastChild);
                    }

                    for (let i = 1; i <= pagination.last; i++) {
                        const el = document.createElement('a');
                        el.href = "#";
                        el.innerHTML = i;
                        if (i === pagination.current) {
                            el.className = 'on';
                        } else {
                            el.addEventListener('click', () => pagination.gotoPage(i));
                        }
                        fragment.appendChild(el);
                    }
                    paginationEl.appendChild(fragment);
                }

                function removeAllChildNods(el) {
                    while (el.hasChildNodes()) {
                        el.removeChild(el.lastChild);
                    }
                }

                function searchDetailAddrFromCoords(coords, callback) {
                    if (!coords) {
                        alert("현재 위치 정보가 없습니다.");
                        return;
                    }
                    geocoder.coord2Address(coords.getLng(), coords.getLat(), callback);
                }
            });
        };
    </script>
</body>
</html>
