<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>마이가드 - 길찾기</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pretendard@1.3.6/dist/web/static/pretendard.css" />
  <link rel="stylesheet" href="../../static/css/map_search.css">
</head>

<body>
  <div class="main-container">
    <header class="header">
      <div class="logo-box">
        <div class="logo-icon">🛡️</div>
        <div class="logo-text">마이가드</div>
      </div>
      <button class="home-btn" onclick="location.href='/'">🏠</button>
    </header>

    <div class="map-container">
      <div class="map-header">
        <h2>🗺️ 장소 검색 & 길찾기</h2>
        <p class="map-description">원하는 장소를 검색하고 길찾기를 시작하세요</p>
      </div>

      <div class="map_wrap">
        <div id="map"></div>
        <div id="menu_wrap">
          <div class="option">
            <form class="form">
              <label for="keyword" style="white-space:nowrap;">키워드 :</label>
              <input type="text" id="keyword" size="15" placeholder="예) 파출소, 지구대" />
              <button type="submit">검색</button>
            </form>
          </div>
          <hr />
          <ul id="placesList"></ul>
          <div id="pagination"></div>
        </div>
      </div>

      <div class="map-info">
        <p>💡 키워드를 입력하여 장소를 검색하세요.<br>📍 결과를 클릭하면 카카오맵 길찾기가 실행됩니다.</p>
      </div>
    </div>

    <nav>
      <a href="/map">경찰서</a>
      <a href="/map/search">길 찾기</a>
      <a href="/blog">게시판</a>
      <a href="/user/manage-emergency-contacts/">긴급연락처</a>
      <a href="/user/mypage/">마이페이지</a>
    </nav>
  </div>
  <script>
    const KAKAO_APP_KEY = "{{ kakao_maps_app_key }}";
    const script = document.createElement("script");
    script.src = `//dapi.kakao.com/v2/maps/sdk.js?appkey=${KAKAO_APP_KEY}&autoload=false&libraries=services`;
    document.head.appendChild(script);

    script.onload = () => {
      kakao.maps.load(() => {
        let presentPosition;
        const mapContainer = document.getElementById('map');
        const mapOption = { center: new kakao.maps.LatLng(37.566826, 126.9786567), level: 5 };
        const map = new kakao.maps.Map(mapContainer, mapOption);
        const ps = new kakao.maps.services.Places();
        const geocoder = new kakao.maps.services.Geocoder();
        const infowindow = new kakao.maps.InfoWindow({ zIndex: 1 });
        let markers = [];

        if (navigator.geolocation) {
          navigator.geolocation.getCurrentPosition(pos => {
            const lat = pos.coords.latitude, lon = pos.coords.longitude;
            presentPosition = new kakao.maps.LatLng(lat, lon);
            map.setCenter(presentPosition);
          });
        }

        document.querySelector('.form').addEventListener('submit', (e) => {
          e.preventDefault();
          searchPlaces();
        });

        function searchPlaces() {
          const keyword = document.getElementById('keyword').value.trim();
          if (!keyword) { alert('원하는 위치를 입력해주세요!'); return; }
          ps.keywordSearch(keyword, placesSearchCB);
        }
        function placesSearchCB(data, status, pagination) {
          if (status === kakao.maps.services.Status.OK) {
            displayPlaces(data);
            displayPagination(pagination);
          } else if (status === kakao.maps.services.Status.ZERO_RESULT) {
            alert('검색 결과가 없습니다.');
          } else {
            alert('검색 중 오류가 발생했습니다.');
          }
        }

        function displayPlaces(places) {
          const listEl = document.getElementById('placesList');
          const bounds = new kakao.maps.LatLngBounds();
          const fragment = document.createDocumentFragment();

          removeAllChildNods(listEl);
          removeMarker();

          places.forEach((place, i) => {
            const placePosition = new kakao.maps.LatLng(place.y, place.x);
            const marker = addMarker(placePosition, i);
            const itemEl = getListItem(i, place);
            bounds.extend(placePosition);

            kakao.maps.event.addListener(marker, 'mouseover', () => displayInfowindow(marker, place.place_name));
            kakao.maps.event.addListener(marker, 'mouseout', () => infowindow.close());

            itemEl.addEventListener('mouseover', () => displayInfowindow(marker, place.place_name));
            itemEl.addEventListener('mouseout', () => infowindow.close());

            const goToMap = () => {
              searchDetailAddrFromCoords(presentPosition, (result, status) => {
                if (status === kakao.maps.services.Status.OK) {
                  const start = result[0].road_address?.address_name || result[0].address.address_name;
                  const end = place.place_name;
                  location.href = `https://map.kakao.com/?sName=${start}&eName=${end}`;
                } else {
                  alert('현재 위치 주소를 찾을 수 없습니다.');
                }
              });
            };

            itemEl.addEventListener('click', goToMap);
            kakao.maps.event.addListener(marker, 'click', goToMap);

            fragment.appendChild(itemEl);
          });

          listEl.appendChild(fragment);
          map.setBounds(bounds);
        }

        function getListItem(index, place) {
          const el = document.createElement('li');
          el.className = 'item';
          el.innerHTML = `
            <span class="markerbg marker_${index + 1}"></span>
            <div class="info">
              <h5>${place.place_name}</h5>
              <span>${place.road_address_name || place.address_name}</span><br>
              <span class="tel">${place.phone || ''}</span>
            </div>`;
          return el;
        }

        function addMarker(position, idx) {
          const marker = new kakao.maps.Marker({ position });
          marker.setMap(map);
          markers.push(marker);
          return marker;
        }

        function removeMarker() { markers.forEach(m => m.setMap(null)); markers = []; }

        function displayInfowindow(marker, title) {
          infowindow.setContent(`<div style="padding:5px;">${title}</div>`);
          infowindow.open(map, marker);
        }
        function displayPagination(pagination) {
          const paginationEl = document.getElementById('pagination');
          const fragment = document.createDocumentFragment();
          while (paginationEl.hasChildNodes()) { paginationEl.removeChild(paginationEl.lastChild); }

          for (let i = 1; i <= pagination.last; i++) {
            const a = document.createElement('a');
            a.href = "#"; a.innerHTML = i;
            if (i === pagination.current) { a.className = 'on'; }
            else { a.addEventListener('click', () => pagination.gotoPage(i)); }
            fragment.appendChild(a);
          }
          paginationEl.appendChild(fragment);
        }

        function removeAllChildNods(el) { while (el.hasChildNodes()) { el.removeChild(el.lastChild); } }

        function searchDetailAddrFromCoords(coords, cb) {
          if (!coords) { alert('현재 위치 정보가 없습니다.'); return; }
          geocoder.coord2Address(coords.getLng(), coords.getLat(), cb);
        }
      });
    };
  </script>
</body>

</html>
